<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Brewing Log</title>
    <style>
        :root {
            --bg-primary: #faf8f5;
            --bg-secondary: #fff;
            --text-primary: #2c1810;
            --text-secondary: #6b4423;
            --accent: #8b5a3c;
            --accent-hover: #6d4830;
            --border: #d4b5a0;
            --input-bg: #fff;
            --shadow: rgba(139, 90, 60, 0.1);
        }

        [data-theme="dark"] {
            --bg-primary: #1a120e;
            --bg-secondary: #2c1f1a;
            --text-primary: #f5e6d3;
            --text-secondary: #d4b5a0;
            --accent: #a67c52;
            --accent-hover: #8b5a3c;
            --border: #4a3a2e;
            --input-bg: #3a2d23;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--bg-secondary);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px var(--shadow);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            color: var(--accent);
            font-size: 28px;
        }

        .coffee-logo {
            width: 28px;
            height: 28px;
            vertical-align: middle;
            margin-right: 8px;
            border-radius: 4px;
            content: url('icons/coffee_sketch_day.jpg');
        }

        [data-theme="dark"] .coffee-logo {
            content: url('icons/coffee_sketch_night.jpg');
        }

        .header-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .theme-toggle, .settings-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .theme-toggle:hover, .settings-btn:hover {
            background: var(--accent-hover);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 14px;
        }

        input[type="date"],
        input[type="number"],
        input[type="text"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            background: var(--input-bg);
            color: var(--text-primary);
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toggle-switch {
            position: relative;
            width: 60px;
            height: 30px;
            background: var(--border);
            border-radius: 15px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .toggle-switch.active {
            background: var(--accent);
        }

        .toggle-slider {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            transition: left 0.3s;
        }

        .toggle-switch.active .toggle-slider {
            left: 33px;
        }

        .radio-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .hidden {
            display: none;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 20px;
        }

        .submit-btn:hover {
            background: var(--accent-hover);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            color: var(--accent);
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .bean-list {
            list-style: none;
            margin-bottom: 20px;
        }

        .bean-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin-bottom: 10px;
            background: var(--input-bg);
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        .bean-item button {
            background: #d9534f;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .add-bean-form {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .add-bean-form input {
            flex: 1;
        }

        .add-bean-form button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 24px;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .header-controls {
                flex-wrap: wrap;
                width: 100%;
            }

            .settings-btn, .theme-toggle {
                flex: 1 1 45%;
                min-width: 120px;
            }

            .radio-group {
                flex-direction: column;
                gap: 10px;
            }

            input[type="number"],
            input[type="text"],
            input[type="date"],
            select {
                font-size: 16px; /* Prevents zoom on iOS */
            }

            .submit-btn {
                font-size: 18px;
                padding: 18px;
            }
        }

        /* Print styles */
        @media print {
            .header-controls,
            .submit-btn,
            .settings-btn,
            .theme-toggle,
            .modal {
                display: none !important;
            }

            .container {
                box-shadow: none;
                padding: 20px;
            }

            body {
                background: white;
            }

            .hidden {
                display: none !important;
            }
        }

        .success-message {
            background: #5cb85c;
            color: white;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .error-message {
            background: #d9534f;
            color: white;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        /* Logs Modal Specific Styles */
        .logs-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .logs-tabs {
            display: flex;
            gap: 10px;
        }

        .tab-btn {
            background: var(--border);
            color: var(--text-primary);
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .tab-btn.active {
            background: var(--accent);
            color: white;
        }

        .logs-count-selector {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logs-count-selector select {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text-primary);
        }

        .refresh-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .logs-container {
            max-height: 60vh;
            overflow-y: auto;
            padding: 10px;
        }

        .logs-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        @media (min-width: 768px) {
            .logs-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .log-card {
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 4px var(--shadow);
        }

        .log-card-header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        .log-card-date {
            font-weight: 600;
            color: var(--accent);
            font-size: 14px;
        }

        .log-card-category {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-primary);
            margin-top: 5px;
        }

        .log-card-body {
            font-size: 14px;
            line-height: 1.6;
        }

        .log-card-row {
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        .log-card-label {
            font-weight: 500;
            color: var(--text-primary);
        }

        .log-feedback {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }

        .feedback-text {
            color: var(--text-secondary);
            white-space: pre-wrap;
        }

        .feedback-toggle {
            color: var(--accent);
            cursor: pointer;
            font-size: 12px;
            margin-top: 5px;
            text-decoration: underline;
        }

        .feedback-toggle:hover {
            color: var(--accent-hover);
        }

        .no-logs {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
            font-size: 16px;
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><img src="icons/coffee_sketch_day.jpg" alt="Coffee" class="coffee-logo"> Coffee Brewing Log</h1>
            <div class="header-controls">
                <button class="settings-btn" onclick="printRecord()">🖨️ Print</button>
                <button class="settings-btn" onclick="screenshotRecord()">📸 Screenshot</button>
                <button class="settings-btn" onclick="testConnection()">🔗 Test Connection</button>
                <button class="settings-btn" onclick="openSettings()">⚙️ Settings</button>
                <button class="theme-toggle" onclick="toggleTheme()">🌙 Toggle Theme</button>
            </div>
        </div>

        <div class="success-message" id="successMessage">
            ✓ Coffee log saved successfully!
        </div>

        <div class="error-message" id="errorMessage"></div>

        <form id="coffeeForm">
            <!-- Date and Time -->
            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" id="date" name="date" required>
            </div>

            <div class="form-group">
                <label>Time of Day</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="morning" name="time" value="morning" required>
                        <label for="morning" style="margin: 0;">Morning</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="afternoon" name="time" value="afternoon">
                        <label for="afternoon" style="margin: 0;">Afternoon</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="night" name="time" value="night">
                        <label for="night" style="margin: 0;">Night</label>
                    </div>
                </div>
            </div>

            <!-- Machine Selection (Reference Only) -->
            <div class="form-group">
                <label for="machineSelect">Machine (Reference Only)</label>
                <select id="machineSelect">
                    <option value="">-- Select Machine --</option>
                </select>
            </div>

            <!-- Category Selection -->
            <div class="form-group">
                <label for="category">Coffee Type</label>
                <select id="category" name="category" required onchange="updateFormFields()">
                    <option value="">-- Select Type --</option>
                    <option value="espresso">Espresso</option>
                    <option value="pourover">Pour Over</option>
                    <option value="others">Others</option>
                </select>
            </div>

            <!-- Espresso Fields -->
            <div id="espressoFields" class="hidden">
                <div class="form-group">
                    <label>Presoak Method</label>
                    <div class="toggle-container">
                        <span>Default Presoak</span>
                        <div class="toggle-switch" id="presoakToggle" onclick="togglePresoak()">
                            <div class="toggle-slider"></div>
                        </div>
                        <span>Manual Presoak</span>
                    </div>
                    <input type="hidden" id="presoakMethod" name="presoak" value="default_presoak">
                </div>

                <div class="form-group">
                    <label for="espressoGranularity">Granularity</label>
                    <input type="number" id="espressoGranularity" name="granularity" step="0.1" value="1.8">
                </div>

                <div class="form-group">
                    <label for="espressoTemp">Temperature (°C)</label>
                    <input type="number" id="espressoTemp" name="temp" step="1" value="98">
                </div>

                <div class="form-group">
                    <label for="espressoWgt">Bean Weight (g)</label>
                    <input type="number" id="espressoWgt" name="wgt" step="0.1" value="18">
                </div>

                <div class="form-group">
                    <label for="milk">Milk Type</label>
                    <select id="milk" name="milk">
                        <option value="no_milk">No Milk</option>
                        <option value="whole_milk">Whole Milk</option>
                        <option value="low_fat_milk">Low Fat Milk</option>
                        <option value="oat_milk">Oat Milk</option>
                        <option value="almond_milk">Almond Milk</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="milkWgt">Milk Weight</label>
                    <select id="milkWgt" name="milk_wgt" onchange="toggleMilkCustom()">
                        <option value="15">15g</option>
                        <option value="30">30g</option>
                        <option value="128">128g</option>
                        <option value="219">219g</option>
                        <option value="custom">Others</option>
                    </select>
                </div>

                <div class="form-group hidden" id="milkCustomGroup">
                    <label for="milkCustom">Custom Milk Weight (g)</label>
                    <input type="number" id="milkCustom" step="1">
                </div>
            </div>

            <!-- Pour Over Fields -->
            <div id="pouroverFields" class="hidden">
                <div class="form-group">
                    <label>Brew Type</label>
                    <div class="radio-group">
                        <div class="radio-option">
                            <input type="radio" id="hot" name="icehot" value="hot">
                            <label for="hot" style="margin: 0;">Hot</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="ice" name="icehot" value="ice">
                            <label for="ice" style="margin: 0;">Ice</label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="pouroverWgt">Bean Weight (g)</label>
                    <input type="number" id="pouroverWgt" name="wgt" step="0.1" value="15">
                </div>

                <div class="form-group">
                    <label for="pouroverGranularity">Granularity</label>
                    <input type="text" id="pouroverGranularity" name="granularity" value="1.8">
                </div>

                <div class="form-group">
                    <label for="pouroverTemp">Temperature (°C)</label>
                    <input type="number" id="pouroverTemp" name="temp" step="1" value="98">
                </div>

                <div class="form-group">
                    <label for="soakWgt">Water Weight for Presoak (g)</label>
                    <input type="number" id="soakWgt" name="soak_wgt" step="1">
                </div>

                <div class="form-group">
                    <label for="firstWgt">First Round Pour Weight (g)</label>
                    <input type="number" id="firstWgt" name="first_wgt" step="1">
                </div>

                <div class="form-group">
                    <label for="secondWgt">Second Round Pour Weight (g)</label>
                    <input type="number" id="secondWgt" name="second_wgt" step="1">
                </div>
            </div>

            <!-- Others Fields -->
            <div id="othersFields" class="hidden">
                <div class="form-group">
                    <label for="othersCategory">Category (e.g., Cold Brew, Aeropress)</label>
                    <input type="text" id="othersCategory" name="others_category">
                </div>

                <div class="form-group">
                    <label for="othersWgt">Bean Weight (g)</label>
                    <input type="number" id="othersWgt" name="others_wgt" step="0.1">
                </div>

                <div class="form-group">
                    <label for="othersNote">Note</label>
                    <textarea id="othersNote" name="others_note"></textarea>
                </div>
            </div>

            <!-- Common Fields -->
            <div class="form-group">
                <label for="beansType">Beans Type</label>
                <select id="beansType" name="beans_type" onchange="toggleBeansCustom()">
                    <option value="">-- Select Beans --</option>
                </select>
            </div>

            <div class="form-group hidden" id="beansCustomGroup">
                <label for="beansCustom">Custom Beans Type</label>
                <input type="text" id="beansCustom" placeholder="Enter custom beans type">
            </div>

            <div class="form-group">
                <label for="feedback">Feedback</label>
                <textarea id="feedback" name="feedback" placeholder="How was the brew? Taste notes, improvements..."></textarea>
            </div>

            <button type="submit" class="submit-btn">Submit Coffee Log</button>

            <button type="button" class="submit-btn" onclick="openLogsModal()" style="margin-top: 10px; background: var(--text-secondary);">
                View Recent Logs
            </button>
        </form>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Settings</h2>
                <button class="close-btn" onclick="closeSettings()">&times;</button>
            </div>
            
            <div style="margin-bottom: 20px;">
                <button class="settings-btn" onclick="showSettingsTab('beans')" id="beansTabBtn" style="margin-right: 10px;">Coffee Beans</button>
                <button class="settings-btn" onclick="showSettingsTab('machines')" id="machinesTabBtn">Machines</button>
            </div>
            
            <!-- Beans Tab -->
            <div id="beansTab">
                <h3 style="color: var(--accent); margin-bottom: 15px;">Coffee Beans</h3>
                <ul class="bean-list" id="beanList"></ul>
                
                <div class="add-bean-form">
                    <input type="text" id="newBeanName" placeholder="New bean name">
                    <button onclick="addBean()">Add Bean</button>
                </div>
            </div>
            
            <!-- Machines Tab -->
            <div id="machinesTab" class="hidden">
                <h3 style="color: var(--accent); margin-bottom: 15px;">Machines</h3>
                <ul class="bean-list" id="machineList"></ul>
                
                <div class="add-bean-form">
                    <input type="text" id="newMachineName" placeholder="New machine name">
                    <button onclick="addMachine()">Add Machine</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Logs Modal -->
    <div class="modal" id="logsModal">
        <div class="modal-content" style="max-width: 900px;">
            <div class="modal-header">
                <h2>📜 Recent Logs</h2>
                <button class="close-btn" onclick="closeLogsModal()">&times;</button>
            </div>
            
            <div class="logs-controls">
                <div class="logs-tabs">
                    <button class="tab-btn" onclick="switchLogsTab('espresso')" id="espressoLogsTab">Espresso</button>
                    <button class="tab-btn active" onclick="switchLogsTab('pourover')" id="pouroverLogsTab">Pour Over</button>
                    <button class="tab-btn" onclick="switchLogsTab('others')" id="othersLogsTab">Others</button>
                </div>
                
                <div class="logs-count-selector">
                    <label for="logsCount">Show:</label>
                    <select id="logsCount" onchange="refreshLogs()">
                        <option value="1">1 log</option>
                        <option value="3" selected>3 logs</option>
                        <option value="5">5 logs</option>
                        <option value="10">10 logs</option>
                    </select>
                    <button class="refresh-btn" onclick="refreshLogs()">↻ Refresh</button>
                </div>
            </div>
            
            <div class="logs-container" id="logsContainer">
                <div class="loading">Loading logs...</div>
            </div>
        </div>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script>
        // Google API Configuration
        const CLIENT_ID = '56190626648-130vc3gfs9qsg4l4ajikvnnvoeqt191q.apps.googleusercontent.com';
        const SPREADSHEET_ID = '1kAqP78RU-rC0Nq-YApMznJGPIlqLvm8NlMN53i-if0g';
        const SCOPES = 'https://www.googleapis.com/auth/spreadsheets';
        
        let tokenClient;
        let accessToken = null;

        // Initialize Google Identity Services
        function initializeGoogleAuth() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: (response) => {
                    if (response.access_token) {
                        accessToken = response.access_token;
                        console.log('✓ Successfully authenticated with Google');
                    }
                },
            });
        }

        // Request access token
        function getAccessToken() {
            return new Promise((resolve, reject) => {
                if (accessToken) {
                    resolve(accessToken);
                } else {
                    tokenClient.callback = (response) => {
                        if (response.error) {
                            reject(response);
                        } else {
                            accessToken = response.access_token;
                            resolve(accessToken);
                        }
                    };
                    tokenClient.requestAccessToken();
                }
            });
        }

        // Submit data to Google Sheets
        async function submitToGoogleSheets(data) {
            try {
                const token = await getAccessToken();
                
                // Determine which sheet and prepare appropriate data
                let sheetName, rowData;
                
                if (data.category === 'espresso') {
                    sheetName = 'Espresso';
                    rowData = [
                        data.date || '',
                        data.time || '',
                        data.beans_type || '',
                        data.wgt || '',
                        data.granularity || '',
                        data.temp || '',
                        data.presoak || '',
                        data.milk || '',
                        data.milk_wgt || '',
                        data.feedback || ''
                    ];
                } else if (data.category === 'pourover') {
                    sheetName = 'Pour Over';
                    rowData = [
                        data.date || '',
                        data.time || '',
                        data.beans_type || '',
                        data.wgt || '',
                        data.granularity || '',
                        data.temp || '',
                        data.icehot || '',
                        data.soak_wgt || '',
                        data.first_wgt || '',
                        data.second_wgt || '',
                        data.feedback || ''
                    ];
                } else if (data.category === 'others') {
                    sheetName = 'Others';
                    rowData = [
                        data.date || '',
                        data.time || '',
                        data.beans_type || '',
                        data.others_wgt || '',
                        data.others_category || '',
                        data.others_note || '',
                        data.feedback || ''
                    ];
                } else {
                    throw new Error('Invalid category');
                }

                // Append row to appropriate sheet
                const response = await fetch(
                    `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${sheetName}:append?valueInputOption=USER_ENTERED`,
                    {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            values: [rowData]
                        })
                    }
                );

                if (!response.ok) {
                    const errorData = await response.json();
                    console.error('Google Sheets API Error:', errorData);
                    throw new Error(`Failed to save: ${errorData.error?.message || 'Unknown error'}`);
                }

                const result = await response.json();
                console.log('✓ Data saved to Google Sheets:', result);
                return true;

            } catch (error) {
                console.error('Error saving to Google Sheets:', error);
                showError('Error saving to Google Sheets: ' + error.message);
                return false;
            }
        }

        // Initialize spreadsheet with headers (run once)
        async function initializeSpreadsheet() {
            try {
                const token = await getAccessToken();
                
                const sheets = [
                    {
                        name: 'Espresso',
                        headers: ['Date', 'Time', 'Beans Type', 'Bean Weight (g)', 'Granularity', 
                                  'Temperature (°C)', 'Presoak Method', 'Milk Type', 'Milk Weight (g)', 'Feedback']
                    },
                    {
                        name: 'Pour Over',
                        headers: ['Date', 'Time', 'Beans Type', 'Bean Weight (g)', 'Granularity',
                                  'Temperature (°C)', 'Ice/Hot', 'Presoak Water (g)', 
                                  'First Pour (g)', 'Second Pour (g)', 'Feedback']
                    },
                    {
                        name: 'Others',
                        headers: ['Date', 'Time', 'Beans Type', 'Bean Weight (g)', 
                                  'Category', 'Note', 'Feedback']
                    }
                ];
                
                for (const sheet of sheets) {
                    // Check if headers exist
                    const checkResponse = await fetch(
                        `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${sheet.name}!A1:Z1`,
                        {
                            headers: {
                                'Authorization': `Bearer ${token}`,
                            }
                        }
                    );
                    
                    const checkData = await checkResponse.json();
                    
                    // If no headers, add them
                    if (!checkData.values || checkData.values.length === 0) {
                        await fetch(
                            `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${sheet.name}!A1?valueInputOption=USER_ENTERED`,
                            {
                                method: 'PUT',
                                headers: {
                                    'Authorization': `Bearer ${token}`,
                                    'Content-Type': 'application/json',
                                },
                                body: JSON.stringify({
                                    values: [sheet.headers]
                                })
                            }
                        );
                        console.log(`✓ ${sheet.name} headers initialized`);
                    }
                }
            } catch (error) {
                console.error('Error initializing spreadsheet:', error);
                throw error;
            }
        }

        // Validate form data
        function validateFormData(data) {
            const errors = [];
            
            // Check required fields
            if (!data.date) errors.push('Date is required');
            if (!data.time) errors.push('Time of day is required');
            if (!data.category) errors.push('Coffee type is required');
            
            // Category-specific validation
            if (data.category === 'espresso') {
                if (data.temp && (data.temp < 50 || data.temp > 100)) {
                    errors.push('Temperature should be between 50-100°C');
                }
                if (data.wgt && data.wgt <= 0) {
                    errors.push('Bean weight must be greater than 0');
                }
                if (data.granularity && data.granularity <= 0) {
                    errors.push('Granularity must be greater than 0');
                }
            } else if (data.category === 'pourover') {
                if (data.temp && (data.temp < 50 || data.temp > 100)) {
                    errors.push('Temperature should be between 50-100°C');
                }
                if (data.wgt && data.wgt <= 0) {
                    errors.push('Bean weight must be greater than 0');
                }
                // Granularity is now text, so no numeric validation
                if (!data.icehot) {
                    errors.push('Please select Ice or Hot');
                }
            } else if (data.category === 'others') {
                if (!data.others_category) {
                    errors.push('Please specify the category (e.g., Cold Brew, Aeropress)');
                }
            }
            
            return errors;
        }

                    scale: 2

        async function refreshLogs() {
            const container = document.getElementById('logsContainer');
            container.innerHTML = '<div class="loading">Loading logs...</div>';
            
            try {
                const token = await getAccessToken();
                
                // Fetch data from all three sheets
                const sheets = ['Espresso', 'Pour Over', 'Others'];
                const categories = ['espresso', 'pourover', 'others'];
                
                for (let i = 0; i < sheets.length; i++) {
                    const response = await fetch(
                        `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${sheets[i]}!A:Z`,
                        {
                            headers: {
                                'Authorization': `Bearer ${token}`,
                            }
                        }
                    );
                    
                    if (response.ok) {
                        const data = await response.json();
                        if (data.values && data.values.length > 1) {
                            // Skip header row, reverse to get newest first
                            const rows = data.values.slice(1).reverse();
                            logsData[categories[i]] = rows;
                        } else {
                            logsData[categories[i]] = [];
                        }
                    }
                }
                
                renderLogs();
            } catch (error) {
                console.error('Error fetching logs:', error);
                container.innerHTML = '<div class="no-logs">Failed to load logs. Please try again.</div>';
            }
        }

        function renderLogs() {
            const container = document.getElementById('logsContainer');
            const count = parseInt(document.getElementById('logsCount').value);
            const data = logsData[currentLogsCategory].slice(0, count);
            
            if (data.length === 0) {
                container.innerHTML = '<div class="no-logs">No logs yet. Start brewing! ☕</div>';
                return;
            }
            
            const grid = document.createElement('div');
            grid.className = 'logs-grid';
            
            data.forEach((row, index) => {
                const card = createLogCard(row, currentLogsCategory, index);
                grid.appendChild(card);
            });
            
            container.innerHTML = '';
            container.appendChild(grid);
        }

        function createLogCard(row, category, index) {

                const [date, time, beans, weight, granularity, temp, presoak, milk, milkWeight, feedback] = row;
                
                html = `
                    <div class="log-card-header">
                        <div class="log-card-date">📅 ${date || 'N/A'} (${capitalizeFirst(time || 'N/A')})</div>
                        <div class="log-card-category">☕ Espresso</div>

                    <div class="log-card-body">
                        <div class="log-card-row"><span class="log-card-label">Beans:</span> ${beans || 'N/A'}</div>
                        <div class="log-card-row"><span class="log-card-label">Weight:</span> ${weight ? weight + 'g' : 'N/A'}</div>
                        <div class="log-card-row"><span class="log-card-label">Granularity:</span> ${granularity || 'N/A'}</div>
                        <div class="log-card-row"><span class="log-card-label">Temp:</span> ${temp ? temp + '°C' : 'N/A'}</div>

                        <div class="log-card-row"><span class="log-card-label">Milk:</span> ${milk || 'N/A'}</div>
                        <div class="log-card-row"><span class="log-card-label">Milk Weight:</span> ${milkWeight ? milkWeight + 'g' : 'N/A'}</div>
                        ${createFeedbackSection(feedback, index)}
                    </div>
                `;
            } else if (category === 'pourover') {
                // Pour Over: Date, Time, Beans Type, Bean Weight, Granularity, Temp, Ice/Hot, Presoak Water, First Pour, Second Pour, Feedback
                const [date, time, beans, weight, granularity, temp, iceHot, presoak, firstPour, secondPour, feedback] = row;
                
                html = `
                    <div class="log-card-header">
                        <div class="log-card-date">📅 ${date || 'N/A'} (${capitalizeFirst(time || 'N/A')})</div>
                        <div class="log-card-category">🫗 Pour Over</div>
                    </div>
                    <div class="log-card-body">
                        <div class="log-card-row"><span class="log-card-label">Beans:</span> ${beans || 'N/A'}</div>
                        <div class="log-card-row"><span class="log-card-label">Weight:</span> ${weight ? weight + 'g' : 'N/A'}</div>
                        <div class="log-card-row"><span class="log-card-label">Granularity:</span> ${granularity || 'N/A'}</div>
                        <div class="log-card-row"><span class="log-card-label">Temp:</span> ${temp ? temp + '°C' : 'N/A'}</div>
                        <div class="log-card-row"><span class="log-card-label">Ice/Hot:</span> ${capitalizeFirst(iceHot || 'N/A')}</div>
                        <div class="log-card-row"><span class="log-card-label">Presoak Water:</span> ${presoak ? presoak + 'g' : 'N/A'}</div>
                        <div class="log-card-row"><span class="log-card-label">First Pour:</span> ${firstPour ? firstPour + 'g' : 'N/A'}</div>
                        <div class="log-card-row"><span class="log-card-label">Second Pour:</span> ${secondPour ? secondPour + 'g' : 'N/A'}</div>
                        ${createFeedbackSection(feedback, index)}
                    </div>
                `;

                // Others: Date, Time, Beans Type, Bean Weight, Category, Note, Feedback

        function createFeedbackSection(feedback, index) {
            if (!feedback) return '';
            
            const maxLength = 60;
            const needsTruncate = feedback.length > maxLength;
            const truncated = needsTruncate ? feedback.substring(0, maxLength) + '...' : feedback;
            
            return `
                <div class="log-feedback">
                    <div class="log-card-label">💬 Feedback:</div>
                    <div class="feedback-text" id="feedback-${index}">
                        ${needsTruncate ? truncated : feedback}
                    </div>
                    ${needsTruncate ? `<div class="feedback-toggle" onclick="toggleFeedback(${index}, '${escapeHtml(feedback)}')">Expand</div>` : ''}
                </div>
            `;
        }

        function toggleFeedback(index, fullText) {
            const element = document.getElementById('feedback-' + index);
            const toggle = element.nextElementSibling;
            
            if (toggle.textContent === 'Expand') {
                element.textContent = fullText;
                toggle.textContent = 'Collapse';
            } else {
                element.textContent = fullText.substring(0, 60) + '...';
                toggle.textContent = 'Expand';
            }
        }

        function capitalizeFirst(str) {
            if (!str) return '';
            return str.charAt(0).toUpperCase() + str.slice(1);
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }
    </script>
</body>
</html>
